<script>
const WHATSAPP_NUMBER = "17863320667";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC9A0xvBRv3XS2bJrh6Q7aNxTtm93RwB-j0qo6-5bbgs-jhDyL4Zr204jmAir_zPyzqw/exec";

function openModal(){
  resetStatus();
  document.getElementById("leadModal").classList.add("show");
}

function closeModal(){
  document.getElementById("leadModal").classList.remove("show");
}

function resetStatus(){
  const box = document.getElementById("statusMessage");
  box.textContent = "";
  box.className = "status-message";
}

function showStatus(message, isError = false){
  const box = document.getElementById("statusMessage");
  box.textContent = message;
  box.className = isError ? "status-message error" : "status-message show";
}

function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function getLeadData(){
  return {
    nombre: document.getElementById("leadName").value.trim(),
    email: document.getElementById("leadEmail").value.trim(),
    interes: document.getElementById("leadAmount").value.trim(),
    mensaje: document.getElementById("leadMessage").value.trim(),
    origen: "shbbunker.com",
    fecha: new Date().toISOString()
  };
}

function saveLocalBackup(data){
  try{
    const previous = JSON.parse(localStorage.getItem("shb_leads_backup") || "[]");
    previous.push(data);
    localStorage.setItem("shb_leads_backup", JSON.stringify(previous));
  }catch(e){}
}

async function saveToGoogleSheets(data){
  const response = await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  return { ok: response.ok };
}

function openWhatsApp(data){
  const text =
    "Nuevo lead SHB%0A%0A" +
    "Nombre: " + encodeURIComponent(data.nombre) + "%0A" +
    "Email: " + encodeURIComponent(data.email) + "%0A" +
    "Interés / monto: " + encodeURIComponent(data.interes) + "%0A" +
    "Mensaje: " + encodeURIComponent(data.mensaje || "Sin mensaje adicional") + "%0A" +
    "Origen: " + encodeURIComponent(data.origen);

  window.open("https://wa.me/" + WHATSAPP_NUMBER + "?text=" + text, "_blank");
}

function clearForm(){
  document.getElementById("leadName").value = "";
  document.getElementById("leadEmail").value = "";
  document.getElementById("leadAmount").value = "";
  document.getElementById("leadMessage").value = "";
}

async function submitLead(){
  resetStatus();

  const btn = document.getElementById("submitBtn");
  const data = getLeadData();

  if(!data.nombre){
    showStatus("Debes indicar tu nombre completo.", true);
    return;
  }

  if(!data.email){
    showStatus("Debes indicar tu email.", true);
    return;
  }

  if(!validateEmail(data.email)){
    showStatus("Debes indicar un email válido.", true);
    return;
  }

  if(!data.interes){
    showStatus("Debes indicar tu monto estimado o nivel de interés.", true);
    return;
  }

  btn.disabled = true;
  btn.textContent = "Procesando...";
  showStatus("Registrando información y preparando contacto...");

  saveLocalBackup(data);

  try{
    await saveToGoogleSheets(data);
    showStatus("Información registrada. Abriendo WhatsApp...");
  }catch(error){
    showStatus("No se confirmó el guardado remoto. Se conserva respaldo local y se abrirá WhatsApp.");
  }

  openWhatsApp(data);
  clearForm();

  setTimeout(() => {
    closeModal();
    resetStatus();
    btn.disabled = false;
    btn.textContent = "Enviar y abrir WhatsApp";
  }, 900);
}

window.addEventListener("click", function(event){
  const modal = document.getElementById("leadModal");
  if(event.target === modal){
    closeModal();
  }
});
</script>
