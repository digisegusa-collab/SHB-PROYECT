
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHB Project | Smart Hybrid Bunker</title>

<style>
body{
font-family: Arial;
background:#0b1a2b;
color:white;
margin:0;
padding:0;
text-align:center;
}

.container{
padding:40px;
}

img{
max-width:300px;
margin-bottom:20px;
}

button{
padding:15px 25px;
font-size:16px;
background:#f08a24;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal.show{
display:flex;
}

.modal-content{
background:#10243c;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:5px;
border:none;
}

.modal button{
width:100%;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo-shb.jpg">
    <h1>Smart Hybrid Bunker</h1>
    <p>Unidad de protección contra huracanes e inundaciones</p>

    <button onclick="openModal()">Conectar</button>
</div>

<!-- MODAL -->
<div class="modal" id="leadModal">
    <div class="modal-content">
        <h2>Contacto</h2>

        <input type="text" id="leadName" placeholder="Nombre">
        <input type="email" id="leadEmail" placeholder="Email">
        <input type="text" id="leadAmount" placeholder="Monto / interés">
        <textarea id="leadMessage" placeholder="Mensaje"></textarea>

        <button id="submitBtn" onclick="submitLead()">Enviar</button>
    </div>
</div>

<!-- SCRIPT CORRECTAMENTE ABAJO -->
<script>
const WHATSAPP_NUMBER = "17863320667";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC9A0xvBRv3XS2bJrh6Q7aNxTtm93RwB-j0qo6-5bbgs-jhDyL4Zr204jmAir_zPyzqw/exec";

function openModal(){
document.getElementById("leadModal").classList.add("show");
}

function closeModal(){
document.getElementById("leadModal").classList.remove("show");
}

function getLeadData(){
return {
nombre: document.getElementById("leadName").value,
email: document.getElementById("leadEmail").value,
interes: document.getElementById("leadAmount").value,
mensaje: document.getElementById("leadMessage").value
};
}

async function submitLead(){

const data = getLeadData();

if(!data.nombre || !data.email || !data.interes){
alert("Completa todos los campos");
return;
}

// guardar en google sheets
try{
await fetch(SCRIPT_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(data)
});
}catch(e){}

// abrir whatsapp SIEMPRE
const text = `Nuevo lead SHB
Nombre: ${data.nombre}
Email: ${data.email}
Interés: ${data.interes}
Mensaje: ${data.mensaje}`;

window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`);

// limpiar
document.getElementById("leadName").value="";
document.getElementById("leadEmail").value="";
document.getElementById("leadAmount").value="";
document.getElementById("leadMessage").value="";

closeModal();
}

// cerrar haciendo clic afuera
window.onclick = function(e){
if(e.target.id === "leadModal"){
closeModal();
}
}
</script>

</body>
</html>
